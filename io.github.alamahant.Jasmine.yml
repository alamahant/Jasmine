app-id: io.github.alamahant.Jasmine
base: io.qt.qtwebengine.BaseApp
base-version: '6.10'
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: Jasmine
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --socket=pulseaudio
  - --filesystem=xdg-documents/Jasmine:create
modules:
  - name: jasmine
    buildsystem: cmake-ninja
    config-opts:
      - -DFLATPAK_BUILD=ON
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: git
        url: https://github.com/alamahant/Jasmine.git
        tag: v1.2.6
        commit: 25519fadd29cc17726ae577a217dabba5984cc9b